# Publish chunk-your-tools to crates.io when a semver tag vX.Y.Z is pushed (not on branch commits).
#
# One-time setup (repository maintainer with admin access):
#
# 1. crates.io — Trusted Publisher (https://crates.io/crates/chunk-your-tools/settings/publishing):
#    - Crate: chunk-your-tools (must have at least one manual publish first)
#    - Owner: qdrddr
#    - Repository: chunk-your-tools
#    - Workflow: publish-crates.yml
#    - Environment name: crates
#
# 2. GitHub — Environment (Settings → Environments → New environment):
#    - Name: crates
#    - Optional: required reviewers, wait timer, deployment branch rule (main only)
#    - No secrets needed when using crates.io trusted publishing (OIDC)
#
# 3. Push a semver tag: v0.2.0, v1.0.0 (exact form vX.Y.Z only). On success,
#    these run in parallel on tag push:
#      1. Publish C FFI artifacts to GitHub Release (publish-c-ffi.yml)
#      3. Publish chunk-your-tools to npm      (publish-npm-sdk.yml)
#      3. Publish chunk-your-tools to PyPI     (publish-pypi-sdk.yml)
#      2. E2E published (crates.io)            (e2e-published-crates.yml)
#      2. E2E published packages              (e2e-published-sdk.yml)
#
# See RFC 3691: https://rust-lang.github.io/rfcs/3691-trusted-publishing-cratesio.html

name: 1. Publish chunk-your-tools to crates.io

on:
  push:
    tags:
      # GitHub glob: digits only, no prerelease suffix (validated again in the job).
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-crate:
    name: Upload chunk-your-tools to crates.io
    runs-on: ubuntu-latest
    environment:
      name: crates
      url: https://crates.io/crates/chunk-your-tools
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Validate tag format
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must be vX.Y.Z (e.g. v0.1.2), got: ${TAG}"
            exit 1
          fi

      - name: Set version from tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Setting chunk-your-tools version to ${VERSION} (from tag ${TAG})"
          cargo set-version "$VERSION"

      - name: Test crate
        run: cargo test -p chunk-your-tools

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        # set-version mutates Cargo.toml in CI; publish the tag-aligned version from the checkout.
        run: cargo publish --allow-dirty

      - name: Prepare release version metadata
        if: github.event_name == 'push'
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          printf '%s' "${VERSION}" > chunk-your-tools-release-version.txt

      - name: Store release version artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: chunk-your-tools-release-version
          path: chunk-your-tools-release-version.txt
          if-no-files-found: error
